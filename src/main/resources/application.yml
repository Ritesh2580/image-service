spring:
  application:
    name: image-service
  
  datasource:
    url: jdbc:h2:mem:imagedb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# Image Processing Configuration
image:
  processing:
    # Thread pool size for image processing (0 = auto-detect based on CPU cores)
    thread-pool-size: 0
    # Chunk size for parallel processing (in pixels)
    chunk-size: 10000
    # Maximum image dimension allowed
    max-dimension: 10000